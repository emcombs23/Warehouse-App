<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Inventory</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>warehouse_db</h1>
      <span class="badge">SQLite</span>
    </div>
    <div class="header-right">
      <span class="connection-status" id="status">connecting...</span>
      <button class="btn btn-register" id="btn-register">Register</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="table-label">inventory</span>
        <span class="row-count" id="row-count">&mdash; rows</span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-add" id="btn-add">+ Add Item</button>
        <input type="text" id="search" placeholder="Filter rows..." />
      </div>
    </div>

    <div class="table-container">
      <table id="inventory-table">
        <thead>
          <tr>
            <th class="col-id">id</th>
            <th>name</th>
            <th>category</th>
            <th>brand</th>
            <th>size</th>
            <th>color</th>
            <th class="col-num">quantity</th>
            <th class="col-num">price</th>
            <th class="col-actions">actions</th>
          </tr>
        </thead>
        <tbody id="inventory-body">
        </tbody>
      </table>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span id="modal-title">Add Item</span>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="item-form">
          <div class="form-row">
            <label for="f-name">Name</label>
            <input type="text" id="f-name" required />
          </div>
          <div class="form-row">
            <label for="f-category">Category</label>
            <input type="text" id="f-category" required />
          </div>
          <div class="form-row">
            <label for="f-brand">Brand</label>
            <input type="text" id="f-brand" required />
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label for="f-size">Size</label>
              <input type="text" id="f-size" />
            </div>
            <div class="form-row">
              <label for="f-color">Color</label>
              <input type="text" id="f-color" />
            </div>
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label for="f-quantity">Quantity</label>
              <input type="number" id="f-quantity" min="0" required />
            </div>
            <div class="form-row">
              <label for="f-price">Price</label>
              <input type="number" id="f-price" min="0" step="0.01" required />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn btn-save" id="btn-save">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Register Modal -->
    <div class="modal-overlay" id="register-overlay">
      <div class="modal">
        <div class="modal-header">
          <span id="register-title">Register</span>
          <button class="modal-close" id="register-close">&times;</button>
        </div>
        <form id="register-form">
          <div class="form-row">
            <label for="r-username">Username</label>
            <input type="text" id="r-username" required />
          </div>
          <div class="form-row">
            <label for="r-password">Password</label>
            <input type="password" id="r-password" required />
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-cancel" id="r-cancel">Cancel</button>
            <button type="submit" class="btn btn-save" id="r-submit">Register</button>
          </div>
          <div id="r-message" class="form-message"></div>
        </form>
      </div>
    </div>

    <div class="footer-bar">
      <span id="footer-info">Loading...</span>
    </div>
  </main>

  <script src="/script.js"></script>
</body>
</html>
